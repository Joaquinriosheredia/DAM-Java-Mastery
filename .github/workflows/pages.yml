name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build site
        run: |
          mkdir -p _site
          cp README.md _site/index.md
          cp -r 01_Java_Core _site/ 2>/dev/null || true
          cp -r 02_Arquitectura _site/ 2>/dev/null || true
          cp -r 03_Spring_Ecosystem _site/ 2>/dev/null || true
          cp -r 04_Bases_de_Datos _site/ 2>/dev/null || true
          cp -r 05_SRE_DevOps _site/ 2>/dev/null || true
          cp -r 06_Seguridad _site/ 2>/dev/null || true
          cp -r 07_BigData_Streaming _site/ 2>/dev/null || true
          cp -r 08_IA_Agentes _site/ 2>/dev/null || true
          # Renombrar archivos con caracteres problematicos
          find _site -name "*:*" -exec bash -c 'mv "$1" "${1//:/}"' _ {} \;
          find _site -name "*,*" -exec bash -c 'mv "$1" "${1//,/_}"' _ {} \;

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
